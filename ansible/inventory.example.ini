# Example inventory for commatrix.
#
# 'commatrix_hosts' are the machines the collector is deployed on and whose
# local databases are pulled. The control node (where snapshots are merged and
# the analytical report is generated) is where you run ansible-playbook.

[commatrix_hosts]
web01 ansible_host=10.0.0.11
web02 ansible_host=10.0.0.12
db01  ansible_host=10.0.0.21

[commatrix_hosts:vars]
ansible_user=ansible
# Deploy runs as root (needed for full attribution, sysctl accounting and DNS
# logging). Set to false to run the service as the unprivileged 'commatrix' user.
commatrix_run_as_root=true
