# Commatrix UserParameters for the Zabbix agent.
#
# Install by copying to /etc/zabbix/zabbix_agentd.d/ (or the agent2 equivalent)
# and restarting the agent. These keys let Zabbix pull collector health and
# high-level summary metrics; the full communication matrix is transported
# separately (snapshot pull or the central collector server).
#
# The agent user must be able to read the commatrix database (adjust perms).

# Number of distinct communication edges recorded for this host.
UserParameter=commatrix.edges.count,/usr/bin/commatrix report --format json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))"

# Number of edges with external peers (outbound + inbound).
UserParameter=commatrix.edges.external,/usr/bin/commatrix report --format json 2>/dev/null | python3 -c "import sys,json; print(sum(1 for r in json.load(sys.stdin) if r.get('peer_class')=='external'))"

# Number of externally reachable inbound services (exposure).
UserParameter=commatrix.exposure.external_inbound,/usr/bin/commatrix report --format json 2>/dev/null | python3 -c "import sys,json; print(sum(1 for r in json.load(sys.stdin) if r.get('direction')=='inbound' and r.get('peer_class')=='external'))"

# Age (seconds) of the most recent observation, for a freshness/heartbeat trigger.
UserParameter=commatrix.last_seen.age,/usr/bin/commatrix report --format json 2>/dev/null | python3 -c "import sys,json,time; rows=json.load(sys.stdin); print(int(time.time()-max([r.get('last_seen') or 0 for r in rows] or [0])))"

# Resolved host parameters as a single JSON blob (dependent-item friendly).
UserParameter=commatrix.hostparams,/usr/bin/commatrix hostparams 2>/dev/null
