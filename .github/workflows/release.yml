name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (X.Y.Z) for a manual build"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF#refs/tags/}"; v="${v#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  sdist-wheel:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/* }

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ needs.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/commatrix:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/commatrix:latest

  appimage:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y libfuse2
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - run: bash packaging/appimage/build-appimage.sh "${{ needs.version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with: { name: appimage, path: "*.AppImage" }

  msi:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - run: powershell -ExecutionPolicy Bypass -File packaging/windows/build_msi.ps1 -Version "${{ needs.version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with: { name: msi, path: dist/*.msi }

  snap:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 packaging/version.py set "${{ needs.version.outputs.version }}"
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: actions/upload-artifact@v4
        with: { name: snap, path: "*.snap" }

  flatpak:
    needs: version
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: commatrix.flatpak
          manifest-path: packaging/flatpak/io.github.fedurca.commatrix.yaml
          cache-key: flatpak-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with: { name: flatpak, path: commatrix.flatpak }

  sbom:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: commatrix-${{ needs.version.outputs.version }}.cdx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: "*.cdx.json" }

  release:
    needs: [version, sdist-wheel, docker, appimage, msi, snap, flatpak, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Collect and checksum
        run: |
          mkdir release
          find artifacts -type f \( -name '*.AppImage' -o -name '*.msi' -o -name '*.snap' \
            -o -name '*.flatpak' -o -name '*.whl' -o -name '*.tar.gz' -o -name '*.cdx.json' \) \
            -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS
          # Signing hook (disabled): add a Windows signtool step for the MSI and
          # 'gpg --detach-sign --armor SHA256SUMS' here once certs/keys exist.
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
