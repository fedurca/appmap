name: Release

# Builds deployment packages and attaches them to a GitHub Release.
# Triggers:
#   - push of tags v1.2.3 or 1.2.3
#   - publishing a release in the GitHub UI (even without a v* tag)
#   - manual "Run workflow" with version X.Y.Z
on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]+.[0-9]+.[0-9]+"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (X.Y.Z) — also the existing release tag to update"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            tag="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          # Semver without optional leading "v"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building packages for tag=$tag version=$version"

  sdist-wheel:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.version.outputs.tag }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/* }

  docker:
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.version.outputs.tag }}
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: VERSION=${{ needs.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/commatrix:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/commatrix:latest

  appimage:
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.version.outputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y libfuse2
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - run: bash packaging/appimage/build-appimage.sh "${{ needs.version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with: { name: appimage, path: "*.AppImage" }

  msi:
    needs: version
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.version.outputs.tag }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - run: python packaging/version.py set "${{ needs.version.outputs.version }}"
      - run: powershell -ExecutionPolicy Bypass -File packaging/windows/build_msi.ps1 -Version "${{ needs.version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: msi
          path: dist/*.msi
          if-no-files-found: error

  snap:
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.version.outputs.tag }}
      - run: python3 packaging/version.py set "${{ needs.version.outputs.version }}"
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: actions/upload-artifact@v4
        with: { name: snap, path: "*.snap" }

  flatpak:
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.version.outputs.tag }}
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: commatrix.flatpak
          manifest-path: packaging/flatpak/io.github.fedurca.commatrix.yaml
          cache-key: flatpak-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with: { name: flatpak, path: commatrix.flatpak }

  sbom:
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.version.outputs.tag }}
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: commatrix-${{ needs.version.outputs.version }}.cdx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: "*.cdx.json" }

  release:
    needs: [version, sdist-wheel, docker, appimage, msi, snap, flatpak, sbom]
    if: ${{ always() && needs.version.result == 'success' && needs.sdist-wheel.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{dist,appimage,msi,snap,flatpak,sbom}"
          merge-multiple: true
          path: artifacts
          # Optional package jobs may be missing (continue-on-error).
        continue-on-error: true
      - name: Collect and checksum
        run: |
          mkdir -p release
          find artifacts -type f \( \
              -name '*.AppImage' -o -name '*.msi' -o -name '*.snap' \
              -o -name '*.flatpak' -o -name '*.whl' -o -name '*.tar.gz' \
              -o -name '*.cdx.json' \
            \) -exec cp -n {} release/ \; 2>/dev/null || true
          n=$(find release -type f | wc -l)
          echo "Collected $n artifact file(s):"
          ls -la release || true
          if [ "$n" -eq 0 ]; then
            echo "No package artifacts to attach" >&2
            exit 1
          fi
          cd release && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: release/*
          fail_on_unmatched_files: false
          generate_release_notes: ${{ github.event_name != 'release' }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
